{% extends "base.html" %}

{% load wagtailcore_tags %}

{% block content %}
    <main class="container mx-auto px-4 py-6">
        <header class="mb-6">
            <h1>{{ page.title }}</h1>
        </header>

        <section aria-labelledby="topics-heading">
            <h2 id="topics-heading" class="text-xl font-semibold mb-4">Topics</h2>

            {% if child_pages %}
                <ul class="flex flex-col gap-2">
                    {% for child in child_pages %}
                        <li>
                            <a href="{% pageurl child %}" class="link link-primary">{{ child.title }}</a>
                        </li>
                    {% endfor %}
                </ul>
            {% else %}
                <p>No topics found.</p>
            {% endif %}
        </section>
    </main>
{% endblock content %}
